<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitchValue</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px
}
.app{
width:100%;
max-width:420px;
background:#111827;
border-radius:24px;
padding:32px;
box-shadow:0 20px 60px rgba(0,0,0,.35)
}
.step{display:none}
.step.active{display:block}
h1{font-size:28px;margin-bottom:14px}
p{color:#cbd5e1;margin-bottom:24px;line-height:1.5}
.btn{
display:block;
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer
}
.option{
background:#1e293b
}
.progress{
height:8px;
background:#1e293b;
border-radius:20px;
margin-bottom:24px;
overflow:hidden
}
.fill{
height:100%;
background:#2563eb;
width:25%;
transition:.3s
}
</style>
</head>
<body>

<div class="app">
<div class="progress"><div class="fill" id="fill"></div></div>

<div class="step active">
<h1>Trasforma le tue carte in un portfolio intelligente</h1>
<p>PitchValue analizza, monitora e valorizza la tua collezione con AI.</p>
<button class="btn" onclick="nextStep()">Inizia setup</button>
</div>

<div class="step">
<h1>Perché usi PitchValue?</h1>
<button class="btn option" onclick="nextStep()">Monitorare valore</button>
<button class="btn option" onclick="nextStep()">Trovare occasioni</button>
<button class="btn option" onclick="nextStep()">Vendere meglio</button>
<button class="btn option" onclick="nextStep()">Investire sui prospect</button>
</div>

<div class="step">
<h1>Quanto è grande la tua collezione?</h1>
<button class="btn option" onclick="nextStep()">&lt;50</button>
<button class="btn option" onclick="nextStep()">50–200</button>
<button class="btn option" onclick="nextStep()">200–500</button>
<button class="btn option" onclick="nextStep()">500+</button>
</div>

<div class="step">
<h1>Primo scan guidato</h1>
<p>Carica una carta. PitchValue la analizzerà e costruirà il tuo portfolio.</p>
<button class="btn" onclick="startScan()">Scansiona prima carta</button>

<div id="scanArea" style="display:none;margin-top:24px">
<div id="scanStatus" style="padding:20px;background:#1e293b;border-radius:16px;text-align:center">
Upload immagine...
</div>
</div>
</div>

</div>

<script>
let current=0;
const steps=document.querySelectorAll('.step');
const fill=document.getElementById('fill');

function nextStep(){
steps[current].classList.remove('active');
current++;
if(current<steps.length){
steps[current].classList.add('active');
fill.style.width=((current+1)/steps.length*100)+'%';
}
}

function startScan(){
const area=document.getElementById('scanArea');
const status=document.getElementById('scanStatus');

area.style.display='block';

status.innerHTML='📸 Caricamento carta...';

setTimeout(()=>{
status.innerHTML='🤖 Analisi AI in corso...';
},1500);

setTimeout(()=>{
status.innerHTML='🔍 Match database...';
},3000);

setTimeout(()=>{
status.innerHTML=`
<div style="text-align:left">
  <div style="background:linear-gradient(135deg,#2563eb,#06b6d4);padding:18px;border-radius:18px;margin-bottom:16px">
    <div style="font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#dbeafe">Carta riconosciuta</div>
    <h2 style="margin:8px 0 4px">Jude Bellingham</h2>
    <p style="margin:0;color:#e0f2fe">Topps Chrome · Refractor</p>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    <div style="background:#0f172a;padding:14px;border-radius:14px">
      <div style="font-size:12px;color:#94a3b8">Valore stimato</div>
      <strong style="font-size:24px">€42</strong>
    </div>
    <div style="background:#0f172a;padding:14px;border-radius:14px">
      <div style="font-size:12px;color:#94a3b8">Confidence</div>
      <strong style="font-size:24px">94%</strong>
    </div>
  </div>

  <div style="background:#052e16;border:1px solid #22c55e;padding:14px;border-radius:14px;margin-bottom:16px">
    <strong>Insight AI</strong>
    <p style="margin:8px 0 0;color:#bbf7d0">Strategia consigliata: HOLD. Rivalutare dopo prossima partita europea.</p>
  </div>

  <button class="btn" onclick="addToPortfolio()">Aggiungi al portfolio</button>
</div>
`;
},5000);
}
  function addToPortfolio(){
const status=document.getElementById('scanStatus');
status.innerHTML=`
<div style="text-align:center">
  <h2>Carta aggiunta al portfolio ✅</h2>
  <p>Jude Bellingham è stata salvata nella tua collezione.</p>
  <button class="btn" onclick="location.reload()">Torna alla dashboard</button>
</div>
`;
}
</script>

</body>
</html>
